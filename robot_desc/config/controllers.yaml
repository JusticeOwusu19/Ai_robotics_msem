controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["wj_LF", "wj_LB"]
    right_wheel_names: ["wj_RF", "wj_RB"]

    wheel_separation: 0.7
    wheel_radius: 0.15

    odom_frame_id: odom
    base_frame_id: body
    publish_rate: 50.0
    enable_odom_tf: true

    use_stamped_vel: false
    cmd_vel_timeout: 0.5

    open_loop: false
    position_feedback: true
